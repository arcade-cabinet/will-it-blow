name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, Type-check, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS files
        run: git lfs pull

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Unit tests (jsdom)
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Install Playwright Chromium (used by Vitest browser provider)
        run: npx playwright install --with-deps chromium

      - name: Browser tests — unit
        run: xvfb-run --auto-servernum pnpm test:browser:unit
      - name: Browser tests — harness
        run: xvfb-run --auto-servernum pnpm test:browser:harness
      - name: Browser tests — micro layer (per-component isolation)
        run: xvfb-run --auto-servernum pnpm test:browser:micro
      - name: Browser tests — meso layer (phases + flows + verdict)
        run: xvfb-run --auto-servernum pnpm test:browser:meso
      - name: Browser tests — macro layer (Yuka GOAP playthroughs)
        run: xvfb-run --auto-servernum pnpm test:browser:macro
      - name: Browser tests — src colocated (TV smoke + perception)
        run: xvfb-run --auto-servernum pnpm test:browser:src
