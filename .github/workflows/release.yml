name: Release — Build Android APKs

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ─── Android Debug APK Builds ──────────────────────────────
  build-android:
    name: Build Android Debug APKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - run: pnpm install --frozen-lockfile

      - name: Generate native project (clean)
        run: npx expo prebuild --platform android --clean --no-install

      - name: Build debug APKs (all architectures)
        working-directory: android
        run: ./gradlew assembleDebug

      - name: List built APKs
        run: find android/app/build/outputs/apk -name "*.apk" -type f

      - name: Upload APKs to release
        env:
          GH_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          for apk in android/app/build/outputs/apk/debug/*.apk; do
            filename=$(basename "$apk")
            echo "Uploading $filename to release $RELEASE_TAG..."
            gh release upload "$RELEASE_TAG" "$apk" --clobber
          done
