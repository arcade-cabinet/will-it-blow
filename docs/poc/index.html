<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordinary Sausage: The Game</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050505; font-family: 'Courier New', Courier, monospace; user-select: none; cursor: crosshair; }
        #canvas-container { width: 100vw; height: 100vh; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff0000; font-size: 1.5rem; font-weight: bold; pointer-events: none; text-shadow: 0 0 10px #ff0000; transition: opacity 0.5s; z-index: 10; text-transform: uppercase; }
        #ui-layer { position: absolute; bottom: 40px; width: 100%; text-align: center; pointer-events: none; z-index: 5; }
        #instructions { display: inline-block; background: rgba(10, 0, 0, 0.85); color: #ff3333; padding: 15px 25px; font-size: 1.4rem; border: 2px solid #550000; text-shadow: 0 0 5px #ff0000; text-transform: uppercase; font-weight: bold; box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); }
        #progress-bar { display: inline-block; width: 400px; height: 12px; background: #220000; border: 1px solid #550000; margin-top: 15px; overflow: hidden; }
        #progress-fill { height: 100%; background: #aa0000; width: 0%; transition: width 0.2s; box-shadow: 0 0 10px #ff0000; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 6; }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script> 
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>
    <div id="crosshair"></div>
    <div id="loading">I WANT TO PLAY A GAME...</div>
    <div id="ui-layer">
        <div id="instructions">Loading...</div><br>
        <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        import RAPIER from 'https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-compat@0.19.3/+esm';
        import * as THREE from 'three';

        await RAPIER.init();

        // --- GLOBAL SETUP ---
        const container = document.getElementById('canvas-container');
        const instructionUI = document.getElementById('instructions');
        const progressFill = document.getElementById('progress-fill');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        scene.fog = new THREE.FogExp2(0x0a0a0a, 0.025); 
        
        const gravity = { x: 0.0, y: -20.0, z: 0.0 };
        const world = new RAPIER.World(gravity);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 0.8; 
        container.appendChild(renderer.domElement);

        // --- FPS PLAYER SETUP ---
        const playerGroup = new THREE.Group();
        playerGroup.position.set(0, 0, 10);
        scene.add(playerGroup);

        const yawObj = new THREE.Group();
        playerGroup.add(yawObj);
        
        const pitchObj = new THREE.Group();
        pitchObj.position.y = 5.5; // Head height
        yawObj.add(pitchObj);

        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        pitchObj.add(camera);

        // --- PROCEDURAL BODY ---
        const skinMat = new THREE.MeshStandardMaterial({color: 0xddbba5, roughness: 0.7});
        const handGeo = new THREE.BoxGeometry(0.25, 0.25, 0.6);
        
        // Hands (Attached to camera to follow view)
        const leftHand = new THREE.Mesh(handGeo, skinMat);
        leftHand.position.set(-0.6, -0.5, -0.8);
        pitchObj.add(leftHand);
        
        const rightHand = new THREE.Mesh(handGeo, skinMat);
        rightHand.position.set(0.6, -0.5, -0.8);
        pitchObj.add(rightHand);

        // Feet (Attached to floor of player)
        const footGeo = new THREE.BoxGeometry(0.4, 0.3, 0.9);
        const leftFoot = new THREE.Mesh(footGeo, skinMat);
        leftFoot.position.set(-0.4, 0.15, 0);
        playerGroup.add(leftFoot);
        
        const rightFoot = new THREE.Mesh(footGeo, skinMat);
        rightFoot.position.set(0.4, 0.15, 0);
        playerGroup.add(rightFoot);

        // Chain tethering the foot to the wall
        const chainGroup = new THREE.Group();
        scene.add(chainGroup);
        const chainLinks = [];
        const linkGeo = new THREE.TorusGeometry(0.12, 0.04, 8, 16);
        const linkMat = new THREE.MeshStandardMaterial({color: 0x333333, metalness: 0.9, roughness: 0.5});
        for(let i=0; i<25; i++) {
            const link = new THREE.Mesh(linkGeo, linkMat);
            chainGroup.add(link); chainLinks.push(link);
        }
        const wallAnchor = new THREE.Vector3(0, 0.5, 18);
        const anchorRing = new THREE.Mesh(new THREE.TorusGeometry(0.3, 0.08, 8, 16), linkMat);
        anchorRing.position.copy(wallAnchor);
        scene.add(anchorRing);
        const chainMaxDist = 17; // Maximum walking distance from wall

        // --- FLUORESCENT OVERHEAD LIGHTING ---
        const ceilMat = new THREE.MeshStandardMaterial({color: 0x111111, roughness: 0.9});
        const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), ceilMat);
        ceiling.rotation.x = Math.PI/2; ceiling.position.y = 12; scene.add(ceiling);

        for(let z=-1; z<=1; z++) {
            const tube = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 10).rotateZ(Math.PI/2), new THREE.MeshBasicMaterial({color: 0xffffff}));
            tube.position.set(0, 11.5, z * 8);
            scene.add(tube);
            const pLight = new THREE.PointLight(0xddeeff, 50, 30);
            pLight.position.set(0, 11, z * 8);
            scene.add(pLight);
            if(z === 0) window.flickerLight = pLight; // Middle light flickers
        }

        const redLight = new THREE.PointLight(0xff0000, 50, 30);
        redLight.position.set(-10, 10, -5); scene.add(redLight);

        // --- GRIMY MATERIALS & FLOOR ---
        const rustyMetalMat = new THREE.MeshStandardMaterial({ color: 0x332222, roughness: 0.9, metalness: 0.6 });
        const darkMetalMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8, metalness: 0.7 });
        const dirtyPlasticMat = new THREE.MeshStandardMaterial({ color: 0x888877, roughness: 0.6 });
        const bloodyTableMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.4, metalness: 0.2 }); 
        
        const floorMesh = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), new THREE.MeshStandardMaterial({color: 0x222222, roughness: 0.8}));
        floorMesh.rotation.x = -Math.PI/2; floorMesh.receiveShadow = true; scene.add(floorMesh);

        // --- KITCHEN ARCHITECTURE ---
        const counterHeight = 4;
        const cabGeo = new THREE.BoxGeometry(40, counterHeight, 12);
        const cabinets = new THREE.Mesh(cabGeo, rustyMetalMat); cabinets.position.set(0, counterHeight/2, 0); cabinets.receiveShadow = true; scene.add(cabinets);
        const counterGeo = new THREE.BoxGeometry(41, 0.4, 13);
        const countertop = new THREE.Mesh(counterGeo, bloodyTableMat); countertop.position.set(0, counterHeight + 0.2, 0); countertop.receiveShadow = true; scene.add(countertop);
        
        const groundBody = world.createRigidBody(RAPIER.RigidBodyDesc.fixed().setTranslation(0, counterHeight + 0.4, 0));
        world.createCollider(RAPIER.ColliderDesc.cuboid(20, 0.1, 6), groundBody);

        const tileCanvas = document.createElement('canvas'); tileCanvas.width = 256; tileCanvas.height = 256; const tCtx = tileCanvas.getContext('2d');
        tCtx.fillStyle = '#444'; tCtx.fillRect(0,0,256,256); tCtx.strokeStyle = '#111'; tCtx.lineWidth = 4; tCtx.strokeRect(0,0,256,256);
        tCtx.fillStyle = 'rgba(100, 0, 0, 0.6)'; for(let i=0; i<10; i++) { tCtx.beginPath(); tCtx.arc(Math.random()*256, Math.random()*256, Math.random()*20+5, 0, Math.PI*2); tCtx.fill(); }
        const tileTex = new THREE.CanvasTexture(tileCanvas); tileTex.wrapS = tileTex.wrapT = THREE.RepeatWrapping; tileTex.repeat.set(20, 5);
        const backsplash = new THREE.Mesh(new THREE.PlaneGeometry(40, 10), new THREE.MeshStandardMaterial({ map: tileTex, roughness: 0.7 }));
        backsplash.position.set(0, counterHeight + 5, -6); backsplash.receiveShadow = true; scene.add(backsplash);

        // --- MR. SAUSAGE CRT TV ---
        const tvCanvas = document.createElement('canvas'); tvCanvas.width = 512; tvCanvas.height = 512; const tvCtx = tvCanvas.getContext('2d');
        const tvTex = new THREE.CanvasTexture(tvCanvas);
        let tvText = "LET'S SAUSAGE";
        
        function updateTVScreen(time) {
            const r = Math.random() * 40; tvCtx.fillStyle = `rgb(${r}, ${r+30}, ${r})`; tvCtx.fillRect(0,0,512,512);
            tvCtx.fillStyle = 'rgba(0,0,0,0.4)'; for(let i=0; i<512; i+=8) tvCtx.fillRect(0, (i + (time*100)) % 512, 512, 4);
            tvCtx.fillStyle = '#fce4d6'; tvCtx.beginPath(); tvCtx.arc(256, 200, 110, 0, Math.PI*2); tvCtx.fill();
            tvCtx.beginPath(); tvCtx.arc(215, 300, 40, 0, Math.PI*2); tvCtx.arc(297, 300, 40, 0, Math.PI*2); tvCtx.fill();
            tvCtx.fillStyle = '#2a1a0c'; tvCtx.beginPath(); tvCtx.ellipse(256, 240, 90, 35, 0, 0, Math.PI, true); tvCtx.fill();
            tvCtx.fillStyle = '#050505'; tvCtx.fillRect(150, 130, 90, 60); tvCtx.fillRect(270, 130, 90, 60); tvCtx.fillRect(240, 150, 30, 10);
            tvCtx.fillStyle = (Math.random() > 0.9) ? '#ffffff' : '#ff0000'; tvCtx.font = 'bold 46px Courier New'; tvCtx.textAlign = 'center';
            tvCtx.shadowColor = '#000'; tvCtx.shadowBlur = 10; tvCtx.fillText(tvText, 256 + (Math.random()-0.5)*3, 440 + (Math.random()-0.5)*3);
            tvCtx.shadowBlur = 0; tvTex.needsUpdate = true;
        }

        const tvGroup = new THREE.Group(); const tvBox = new THREE.Mesh(new THREE.BoxGeometry(8, 7, 1.5), rustyMetalMat);
        const tvScreen = new THREE.Mesh(new THREE.PlaneGeometry(7.2, 6.2), new THREE.MeshBasicMaterial({map: tvTex})); tvScreen.position.set(0, 0, 0.76);
        tvGroup.add(tvBox, tvScreen); tvGroup.position.set(0, counterHeight + 9, -5); scene.add(tvGroup);
        const tvLight = new THREE.PointLight(0x33ff33, 30, 20); tvLight.position.set(0, counterHeight + 9, -3); scene.add(tvLight);

        // --- PROCEDURAL MEAT TEXTURE ---
        function generateMeatTexture(colorHex, fatRatio) {
            const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512; const ctx = canvas.getContext('2d');
            ctx.fillStyle = colorHex; ctx.fillRect(0, 0, 512, 512);
            const drawSpecks = (c, sr, cols, a) => { ctx.globalAlpha = a; for(let i=0; i<c; i++){ ctx.fillStyle = cols[Math.floor(Math.random()*cols.length)]; ctx.beginPath(); ctx.arc(Math.random()*512, Math.random()*512, Math.random()*sr.max+sr.min, 0, Math.PI*2); ctx.fill(); } };
            drawSpecks(1000, {min:1, max:4}, ['#5a1b1b', '#3b0b0b', '#781c1c'], 0.8); 
            drawSpecks(Math.floor(3000 * fatRatio), {min:1, max:3}, ['#dcc2c2', '#dcebeb', '#c8aaaa'], 0.7);
            ctx.globalAlpha = 1.0; ctx.filter = 'blur(1px)'; ctx.drawImage(canvas, 0, 0); ctx.filter = 'none';
            const tex = new THREE.CanvasTexture(canvas); tex.wrapS = tex.wrapT = THREE.RepeatWrapping; const bumpTex = new THREE.CanvasTexture(canvas); bumpTex.wrapS = bumpTex.wrapT = THREE.RepeatWrapping; return { map: tex, bumpMap: bumpTex };
        }
        const meatMat = new THREE.MeshPhysicalMaterial({ color: 0xffaaaa, roughness: 0.4, clearcoat: 0.9, clearcoatRoughness: 0.1 });

        // --- 1. GRINDING STATION (Left: X = -10) ---
        const gX = -10; const cY = counterHeight + 0.4; const grinderGroup = new THREE.Group(); scene.add(grinderGroup);
        const gMotor = new THREE.Mesh(new THREE.BoxGeometry(4, 4.5, 5), rustyMetalMat); gMotor.position.set(gX, cY + 2.25, -2); gMotor.castShadow=true; grinderGroup.add(gMotor);
        const gExtruder = new THREE.Mesh(new THREE.CylinderGeometry(1.0, 1.0, 4, 32).rotateX(Math.PI/2), rustyMetalMat); gExtruder.position.set(gX, cY + 2.5, 0); gExtruder.castShadow=true; grinderGroup.add(gExtruder);
        const gChute = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 0.8, 2.5, 32), rustyMetalMat); gChute.position.set(gX, cY + 4.5, 0.5); gChute.castShadow=true; grinderGroup.add(gChute);
        const gTray = new THREE.Mesh(new THREE.BoxGeometry(5, 0.3, 4), rustyMetalMat); gTray.position.set(gX, cY + 5.6, 0.5); gTray.castShadow=true; grinderGroup.add(gTray);
        const gFaceplate = new THREE.Mesh(new THREE.CylinderGeometry(1.05, 1.05, 0.2, 32).rotateX(Math.PI/2), darkMetalMat); gFaceplate.position.set(gX, cY + 2.5, 2.0); grinderGroup.add(gFaceplate);
        
        const gSwitchHitbox = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.5, 16).rotateZ(Math.PI/2), rustyMetalMat); gSwitchHitbox.position.set(gX+2.1, cY + 3, -2); grinderGroup.add(gSwitchHitbox);
        const gSwitchNotch = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.0, 0.1), darkMetalMat); gSwitchNotch.position.set(gX+2.35, cY + 3, -2); grinderGroup.add(gSwitchNotch);

        const plungerGroup = new THREE.Group(); plungerGroup.position.set(gX+3, cY + 5.6, 0.5); 
        const pShaft = new THREE.Mesh(new THREE.CylinderGeometry(0.75, 0.75, 3), dirtyPlasticMat); pShaft.position.y = 1.5; plungerGroup.add(pShaft);
        const pGuard = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 0.2), dirtyPlasticMat); pGuard.position.y = 3; plungerGroup.add(pGuard);
        const pHandle = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 1.5), dirtyPlasticMat); pHandle.position.y = 3.8; plungerGroup.add(pHandle);
        const plungerHitbox = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, 5), new THREE.MeshBasicMaterial({visible: false})); plungerHitbox.position.y = 2.5; plungerGroup.add(plungerHitbox); grinderGroup.add(plungerGroup);

        const bowlGeo = new THREE.LatheGeometry([new THREE.Vector2(0.01, 0), new THREE.Vector2(3, 0), new THREE.Vector2(3.5, 1.5), new THREE.Vector2(3.3, 1.6), new THREE.Vector2(2.8, 0.2), new THREE.Vector2(0.01, 0.2)], 32); 
        const mainBowl = new THREE.Mesh(bowlGeo, rustyMetalMat); mainBowl.position.set(gX-5, cY, 2); mainBowl.castShadow=true; scene.add(mainBowl);
        const mainBowlHitbox = new THREE.Mesh(new THREE.CylinderGeometry(3.5, 3.5, 2), new THREE.MeshBasicMaterial({visible: false})); mainBowlHitbox.position.set(gX-5, cY+1, 2); scene.add(mainBowlHitbox);

        const chunks = []; const chunkGeo = new THREE.DodecahedronGeometry(0.5, 1);
        for(let i=0; i<15; i++) {
            const chunk = new THREE.Mesh(chunkGeo, meatMat); chunk.castShadow = true; chunk.userData = { state: 'BOWL' };
            chunk.position.set(gX-5 + (Math.random()-0.5)*3, cY+0.5 + Math.random()*1, 2 + (Math.random()-0.5)*3); scene.add(chunk); chunks.push(chunk);
        }
        const meatMound = new THREE.Mesh(new THREE.SphereGeometry(2.8, 32, 16, 0, Math.PI*2, 0, Math.PI/2), meatMat); meatMound.position.set(0, 0.2, 0); meatMound.scale.set(0.001, 0.001, 0.001); mainBowl.add(meatMound);
        const maxGParts = 150; const gPartMesh = new THREE.InstancedMesh(new THREE.CylinderGeometry(0.08, 0.08, 0.5, 6).rotateX(Math.PI/2), meatMat, maxGParts); gPartMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage); scene.add(gPartMesh);
        const gPartData = []; for(let i=0; i<maxGParts; i++) gPartData.push({ active: false, pos: new THREE.Vector3(), vel: new THREE.Vector3(), rot: new THREE.Euler() });

        // --- 2. STUFFING STATION (Center: X = 0) ---
        const sX = 0; const stufferGroup = new THREE.Group(); scene.add(stufferGroup);
        const sBase = new THREE.Mesh(new THREE.BoxGeometry(6, 0.5, 6), rustyMetalMat); sBase.position.set(sX, cY + 0.25, -2); stufferGroup.add(sBase);
        const sCanister = new THREE.Mesh(new THREE.CylinderGeometry(2, 2, 6, 32), rustyMetalMat); sCanister.position.set(sX, cY + 3.5, -2); stufferGroup.add(sCanister);
        const sTop = new THREE.Mesh(new THREE.BoxGeometry(6, 1.5, 2.5), rustyMetalMat); sTop.position.set(sX, cY + 7.25, -2); stufferGroup.add(sTop);
        const sNozzle = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.7, 2.5, 32).rotateX(Math.PI/2), darkMetalMat); sNozzle.position.set(sX, cY + 1.0, 0); stufferGroup.add(sNozzle);
        const nozzleTipPos = new THREE.Vector3(sX, cY + 1.0, 1.25);
        const sTray = new THREE.Mesh(new THREE.BoxGeometry(10, 0.2, 10), rustyMetalMat); sTray.position.set(sX, cY + 0.1, 6); stufferGroup.add(sTray);
        const sTrayHitbox = new THREE.Mesh(new THREE.BoxGeometry(10, 2, 10), new THREE.MeshBasicMaterial({visible:false})); sTrayHitbox.position.set(sX, cY+1, 6); stufferGroup.add(sTrayHitbox);

        const sRod = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 10, 16), darkMetalMat); sRod.position.set(sX, cY + 8, -2); stufferGroup.add(sRod);
        const crankGroup = new THREE.Group(); crankGroup.position.set(sX + 3, cY + 7.25, -2);
        const cArm = new THREE.Mesh(new THREE.BoxGeometry(0.3, 3, 0.3), rustyMetalMat); cArm.position.set(0, 1.5, 0); crankGroup.add(cArm);
        const cHandle = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 1.5).rotateX(Math.PI/2), darkMetalMat); cHandle.position.set(0, 3, 0.75); crankGroup.add(cHandle); stufferGroup.add(crankGroup);

        const waterBowl = new THREE.Mesh(bowlGeo, rustyMetalMat); waterBowl.position.set(sX+5, cY, -1); waterBowl.scale.set(0.7, 0.7, 0.7); stufferGroup.add(waterBowl);
        const water = new THREE.Mesh(new THREE.CylinderGeometry(2.3, 2.3, 0.1, 32), new THREE.MeshPhysicalMaterial({color: 0x445544, transmission: 0.7, opacity: 1})); water.position.set(sX+5, cY+0.8, -1); stufferGroup.add(water);
        const casingMat = new THREE.MeshPhysicalMaterial({ color: 0xddddcc, transmission: 0.5, opacity: 1, roughness: 0.6, thickness: 0.1, side: THREE.DoubleSide });
        
        class SquigglyCurve extends THREE.Curve { getPoint(t, target = new THREE.Vector3()) { return target.set(sX+5 + Math.sin(t*20)*1, cY+0.3 + Math.abs(Math.cos(t*15)*0.5), -1 + Math.cos(t*25)*1); } }
        const unattachedCasing = new THREE.Mesh(new THREE.TubeGeometry(new SquigglyCurve(), 64, 0.3, 12, false), casingMat); stufferGroup.add(unattachedCasing);
        const waterBowlHitbox = new THREE.Mesh(new THREE.CylinderGeometry(2.5, 2.5, 1.5), new THREE.MeshBasicMaterial({visible:false})); waterBowlHitbox.position.copy(waterBowl.position); waterBowlHitbox.position.y += 0.5; stufferGroup.add(waterBowlHitbox);

        const draggedCurve = new THREE.QuadraticBezierCurve3(new THREE.Vector3(sX+5, cY+1, -1), new THREE.Vector3(sX+2, cY+3, 0), new THREE.Vector3(sX, cY+1, 1));
        const draggedCasing = new THREE.Mesh(new THREE.TubeGeometry(draggedCurve, 32, 0.3, 12, false), casingMat); draggedCasing.visible = false; stufferGroup.add(draggedCasing);
        
        const bunchedCasingGeo = new THREE.CylinderGeometry(0.4, 0.4, 2.0, 32, 32, true); const pA = bunchedCasingGeo.attributes.position; for(let i=0; i<pA.count; i++) { pA.setX(i, pA.getX(i) * (1 + 0.1*Math.sin(pA.getY(i)*40))); pA.setZ(i, pA.getZ(i) * (1 + 0.1*Math.sin(pA.getY(i)*40))); } bunchedCasingGeo.computeVertexNormals(); bunchedCasingGeo.rotateX(Math.PI/2);
        const attachedCasing = new THREE.Mesh(bunchedCasingGeo, casingMat); attachedCasing.position.set(sX, cY+1.0, 0); attachedCasing.visible = false; stufferGroup.add(attachedCasing);

        // CEREAL BOX TARGET
        const cBoxTexCanvas = document.createElement('canvas'); cBoxTexCanvas.width=256; cBoxTexCanvas.height=256; const cbCtx = cBoxTexCanvas.getContext('2d');
        cbCtx.fillStyle = '#aa8800'; cbCtx.fillRect(0,0,256,256); cbCtx.fillStyle = '#ff0000'; cbCtx.font = 'bold 30px Arial'; cbCtx.fillText("Bland", 80, 80); cbCtx.fillText("Flakes", 70, 120);
        const cBoxMat = new THREE.MeshStandardMaterial({map: new THREE.CanvasTexture(cBoxTexCanvas), roughness: 0.9});
        const cerealBoxMesh = new THREE.Mesh(new THREE.BoxGeometry(2, 3.5, 1), cBoxMat); cerealBoxMesh.castShadow = true; scene.add(cerealBoxMesh);
        const cBoxDesc = RAPIER.RigidBodyDesc.dynamic().setTranslation(sX, cY + 2.0, 8).setLinearDamping(0.5).setAngularDamping(0.5);
        const cBoxBody = world.createRigidBody(cBoxDesc); world.createCollider(RAPIER.ColliderDesc.cuboid(1.0, 1.75, 0.5).setMass(2.0), cBoxBody);

        // --- 3. COOKING STATION (Right: X = 11) ---
        const stoveX = 11; const stoveGroup = new THREE.Group(); scene.add(stoveGroup);
        const stoveBase = new THREE.Mesh(new THREE.BoxGeometry(12, 1, 11), rustyMetalMat); stoveBase.position.set(stoveX, cY+0.5, 0); stoveGroup.add(stoveBase);
        const stoveBack = new THREE.Mesh(new THREE.BoxGeometry(12, 3, 1), darkMetalMat); stoveBack.position.set(stoveX, cY+2, -5); stoveGroup.add(stoveBack);
        
        const burnerGeo = new THREE.TorusGeometry(1.5, 0.15, 8, 32); burnerGeo.rotateX(Math.PI/2);
        const burnerBR = new THREE.Mesh(burnerGeo, darkMetalMat.clone()); burnerBR.position.set(stoveX+2.5, cY+1.05, -2); stoveGroup.add(burnerBR);
        const burnerFL = new THREE.Mesh(burnerGeo, darkMetalMat.clone()); burnerFL.position.set(stoveX-2.5, cY+1.05, 2); stoveGroup.add(burnerFL);

                cookLevel += delta * 0.04; progressFill.style.width = (80 + cookLevel*20) + '%';
                const tC = new THREE.Color();
                if(cookLevel<0.5) tC.lerpColors(new THREE.Color(0xffaaaa), new THREE.Color(0x3a1010), cookLevel/0.5); else tC.lerpColors(new THREE.Color(0x3a1010), new THREE.Color(0x050505), (cookLevel-0.5)/0.5);
                meatMat.color.copy(tC); meatMat.roughness = Math.min(1.0, 0.4 + cookLevel*0.8); meatMat.bumpScale = 0.08 + cookLevel*0.4; meatMat.clearcoat = 0.9 * Math.max(0, 1 - cookLevel*1.5);
                sausageMesh.scale.set(1 - cookLevel*0.2, 1, 1 - cookLevel*0.2);
                greaseMat.opacity = 0.2 + cookLevel*0.7; greasePool.position.y = 0.25 + cookLevel*0.15;
                if(cookLevel >= 1.0) { tvText = "5 OUT OF 5 RUFFALOS"; setInstruction("5 OUT OF 5 RUFFALOS. GAME OVER.", 100); isCooking = false; }
            }

            world.step();
            const cbPos = cBoxBody.translation(), cbRot = cBoxBody.rotation(); cerealBoxMesh.position.set(cbPos.x, cbPos.y, cbPos.z); cerealBoxMesh.quaternion.set(cbRot.x, cbRot.y, cbRot.z, cbRot.w);

            if(sausageMesh && pBodies.length > 0) {
                for(let i=0; i<pBodies.length; i++) {
                    const a = pAnchors[i], b = pBodies[i];
                    if(gameState === 4) { 
                        if(stuffLevel >= a.t && !a.ext) {
                            a.ext = true; pBones[i].scale.setScalar(1); b.setTranslation({x: nozzleTipPos.x, y: nozzleTipPos.y, z: nozzleTipPos.z}, true); b.setLinvel({x:0,y:0,z:0}, true);
                            b.applyImpulse({x: (Math.random()-0.5)*1.0, y: 1.5, z: 25.0}, true);
                        }
                        if(!a.ext) continue; 
                    }
                    if (gameState !== 4) {
                        const p = a.base.clone();
                        if(gameState >= 5 && cookLevel > 0) {
                            const sY = 1 - (cookLevel*0.25), d2 = Math.sqrt((p.x-a.tgt.x)**2 + (p.z-a.tgt.z)**2); p.y = (p.y * sY) + ((d2*0.12) ** 2 * cookLevel * 0.8);
                            if(isCooking) { p.x += Math.sin(time*25+i)*0.04; p.z += Math.cos(time*28+i)*0.04; } 
                        }
                        const pos = b.translation(), vel = b.linvel();
                        b.applyImpulse({x: ((p.x-pos.x)*80 - vel.x*10)*delta, y: ((p.y-pos.y)*80 - vel.y*10)*delta, z: ((p.z-pos.z)*80 - vel.z*10)*delta}, true);
                    }
                    const pPos = b.translation(); pBones[i].position.set(pPos.x, pPos.y, pPos.z);
                }
            }

            if(isCooking) {
                splatCount = 0; 
                for(let i=0; i<Math.floor(cookLevel*15); i++){ sDum.position.set(Math.random()*4.3*Math.cos(Math.random()*Math.PI*2), Math.random()*4.3*Math.sin(Math.random()*Math.PI*2), 0); sDum.scale.setScalar(0.5+Math.random()); sDum.updateMatrix(); splatMesh.setMatrixAt(splatCount++, sDum.matrix); }
                pBodies.forEach((b, i) => { if(pBones[i].position.y < cY+1.5 && b.linvel().x > 0.2) { sDum.position.set(pBones[i].position.x - pan.position.x, -(pBones[i].position.z - pan.position.z), 0); sDum.scale.setScalar(1.5); sDum.updateMatrix(); splatMesh.setMatrixAt(splatCount++, sDum.matrix); }});
                splatMesh.count = splatCount; if(splatCount>0){ splatMesh.instanceMatrix.needsUpdate=true; renderer.setRenderTarget(rtCurr); renderer.autoClear=false; renderer.render(splatScene, splatCamera); renderer.autoClear=true; }
                fQuad.material=simMat; simMat.uniforms.u_curr.value=rtCurr.texture; simMat.uniforms.u_prev.value=rtPrev.texture; simMat.uniforms.damp.value=0.98-cookLevel*0.05; renderer.setRenderTarget(rtNext); renderer.render(fScene, fCam);
                fQuad.material=normMat; normMat.uniforms.u_h.value=rtNext.texture; renderer.setRenderTarget(rtNorm); renderer.render(fScene, fCam);
                const t=rtPrev; rtPrev=rtCurr; rtCurr=rtNext; rtNext=t; renderer.setRenderTarget(null);

                const sPos = steamMesh.geometry.attributes.position.array; let sAct=0;
                for(let i=0; i<200; i++) {
                    if(sPartLife[i]<=0 && Math.random()<cookLevel*0.8) {
                        const bIdx = Math.floor(Math.random()*pBones.length); const pt = pBones[bIdx].position;
                        sPos[i*3]=pt.x; sPos[i*3+1]=pt.y; sPos[i*3+2]=pt.z;
                        sPartVel[i].set((Math.random()-0.5), 1+Math.random()*2, (Math.random()-0.5)); sPartLife[i]=1;
                    }
                    if(sPartLife[i]>0) {
                        sPartLife[i]-=delta*0.5; sPos[i*3]+=sPartVel[i].x*delta; sPos[i*3+1]+=sPartVel[i].y*delta; sPos[i*3+2]+=sPartVel[i].z*delta;
                        if(sPartLife[i]<=0) sPos[i*3]=999; sAct++;
                    }
                }
                steamMesh.geometry.attributes.position.needsUpdate=true; steamMesh.material.opacity = Math.max(0.1, 0.8 - (sAct/200)*0.2);
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
